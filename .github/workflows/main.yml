name: CI/CD Pipeline - Codigos Sequenciais

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    # Define o banco de dados como um serviço (Rápido e Isolado)
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: codigos_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4 # Atualizado para v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Não é necessário instalar o mysql-server, apenas o cliente para rodar os comandos
      - name: Instalar MySQL Client e dependências Python
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client
          pip install -r requirements.txt

      # Criamos o usuário que seu teste espera
      - name: Configurar usuario MySQL
        run: |
          mysql -h 127.0.0.1 -u root -prootpassword -e "CREATE USER 'ciuser'@'%' IDENTIFIED BY 'cipassword';"
          mysql -h 127.0.0.1 -u root -prootpassword -e "GRANT ALL PRIVILEGES ON *.* TO 'ciuser'@'%' WITH GRANT OPTION;"
          mysql -h 127.0.0.1 -u root -prootpassword -e "FLUSH PRIVILEGES;"

      - name: Executar setup.sql
        run: |
          mysql -h 127.0.0.1 -u ciuser -pcipassword codigos_db < setup.sql

      - name: Verificar banco e tabela
        run: |
          mysql -h 127.0.0.1 -u ciuser -pcipassword codigos_db -e "SHOW TABLES; DESCRIBE codigos_sequenciais;"

      - name: Executar testes com pytest
        env:
          # Dica: Passe as credenciais via variáveis de ambiente se o seu código Python suportar
          DB_HOST: 127.0.0.1
          DB_USER: ciuser
          DB_PASS: cipassword
          DB_NAME: codigos_db
        run: |
          pytest test_codigos.py -v --tb=short